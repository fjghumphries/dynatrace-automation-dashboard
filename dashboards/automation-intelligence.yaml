  tiles:
    "1":
      title: ""
      type: markdown
      content: |
        ## 🤖 Automation Intelligence Center
        **Problem → Workflow correlation · Remediation health · Root cause recurrence · MTTR analysis**
        *Detect where automation is masking root causes instead of resolving them*

    "2":
      title: "Active Problems"
      type: data
      query: |
        fetch dt.davis.problems
        | filter not(dt.davis.is_duplicate) and event.status == "ACTIVE"
        | summarize active_problems = count()
      visualization: singleValue
      visualizationSettings:
        autoSelectVisualization: false
        singleValue:
          showLabel: true
          label: "Active Problems"
          recordField: active_problems
      coloring:
        colorRules:
          - { colorMode: custom-color, comparator: ">", customColor: { Default: "#2f6862" }, field: active_problems, value: -1 }
          - { colorMode: custom-color, comparator: ">", customColor: { Default: "#eea53c" }, field: active_problems, value: 10 }
          - { colorMode: custom-color, comparator: ">", customColor: { Default: "#c62239" }, field: active_problems, value: 20 }
      davis:
        enabled: false
        davisVisualization:
          isAvailable: true

    "3":
      title: "Availability Issues"
      type: data
      query: |
        fetch dt.davis.problems
        | filter not(dt.davis.is_duplicate) and event.status == "ACTIVE"
          and event.category == "AVAILABILITY"
        | summarize count = count()
      visualization: singleValue
      visualizationSettings:
        autoSelectVisualization: false
        singleValue:
          showLabel: true
          label: "Availability"
          recordField: count
      coloring:
        colorRules:
          - { colorMode: custom-color, comparator: ">", customColor: { Default: "#2f6862" }, field: count, value: -1 }
          - { colorMode: custom-color, comparator: ">", customColor: { Default: "#eea53c" }, field: count, value: 2 }
          - { colorMode: custom-color, comparator: ">", customColor: { Default: "#c62239" }, field: count, value: 5 }
      davis:
        enabled: false
        davisVisualization:
          isAvailable: true

