    "7":
      title: ""
      type: markdown
      content: "### 🌐 Problem Landscape"

    "8":
      title: "Active Problems by Category"
      type: data
      query: |
        fetch dt.davis.problems
        | filter not(dt.davis.is_duplicate) and event.status == "ACTIVE"
        | summarize count(), by: {event.category}
        | sort `count()` desc
      visualization: pieChart
      visualizationSettings:
        autoSelectVisualization: false
      davis:
        enabled: false
        davisVisualization:
          isAvailable: true

    "9":
      title: "Problem Activity Over Time — Active vs Closed by Category"
      type: data
      query: |
        fetch dt.davis.problems
        | filter not(dt.davis.is_duplicate)
        | makeTimeseries active = countIf(event.status == "ACTIVE"),
            closed = countIf(event.status == "CLOSED"),
            interval: 30m,
            by: {event.category}
      visualization: areaChart
      visualizationSettings:
        autoSelectVisualization: false
        chartSettings:
          legend:
            position: bottom
            showLegend: true
          stacked: false
      davis:
        enabled: false
        davisVisualization:
          isAvailable: true

    "10":
      title: ""
      type: markdown
      content: "### 📋 Problem Details & Entity Impact"

    "11":
      title: "Recent Problems — Status, Root Cause & Blast Radius"
      type: data
      query: |
        fetch dt.davis.problems
        | filter not(dt.davis.is_duplicate)
        | fields display_id, event.name, event.category, event.status,
            event.start, root_cause_entity_name,
            affected_count = arraySize(smartscape.affected_entity.ids)
        | sort event.start desc
        | limit 25
      visualization: table
      visualizationSettings:
        autoSelectVisualization: false
        table:
          linewrapEnabled: true
      davis:
        enabled: false
        davisVisualization:
          isAvailable: true

    "12":
      title: "Active Problems by Affected Entity Type"
      type: data
      query: |
        fetch dt.davis.problems
        | filter not(dt.davis.is_duplicate) and event.status == "ACTIVE"
        | filter isNotNull(smartscape.affected_entity.types)
        | fieldsAdd entity_type = arrayToString(smartscape.affected_entity.types, delimiter: ",")
        | summarize total = count(),
            avg_blast_radius = avg(arraySize(smartscape.affected_entity.ids)),
            by: {entity_type}
        | sort total desc
        | limit 10
      visualization: table
      visualizationSettings:
        autoSelectVisualization: false
        table:
          linewrapEnabled: false
      davis:
        enabled: false
        davisVisualization:
          isAvailable: true

    "13":
      title: ""
      type: markdown
      content: "### 🔬 Root Cause Intelligence"

    "14":
      title: "Known Root Causes — Recurrence & Active Status"
      type: data
      query: |
        fetch dt.davis.problems
        | filter not(dt.davis.is_duplicate)
        | filter isNotNull(root_cause_entity_name)
        | summarize total_problems = count(),
            active_now = countIf(event.status == "ACTIVE"),
            last_seen = max(event.start),
            by: {root_cause_entity_name}
        | sort total_problems desc
        | limit 15
      visualization: table
      visualizationSettings:
        autoSelectVisualization: false
        table:
          linewrapEnabled: false
      davis:
        enabled: false
        davisVisualization:
          isAvailable: true

    "15":
      title: "Avg Time to Resolve by Category (minutes)"
      type: data
      query: |
        fetch dt.davis.problems
        | filter not(dt.davis.is_duplicate)
        | fieldsAdd duration_min = (coalesce(event.end, now()) - event.start)
            / 1000000000 / 60
        | summarize mttr_min = avg(duration_min), by: {event.category}
        | sort mttr_min desc
      visualization: table
      visualizationSettings:
        autoSelectVisualization: false
        table:
          linewrapEnabled: false
      davis:
        enabled: false
        davisVisualization:
          isAvailable: true

    "16":
      title: ""
      type: markdown
      content: "### 🤖 Automation & Workflow Activity"

    "17":
      title: "Workflow Executions — Pass / Fail"
      type: data
      query: |
        fetch bizevents
        | filter event.provider == "workflows"
        | summarize executions = count(),
            passed = countIf(test.result == "pass"),
            failed = countIf(test.result == "fail"),
            by: {event.type}
        | sort executions desc
      visualization: table
      visualizationSettings:
        autoSelectVisualization: false
        table:
          linewrapEnabled: false
      davis:
        enabled: false
        davisVisualization:
          isAvailable: true

    "18":
      title: "Anomaly Signal Volume Over Time — Kubernetes & Metric Events"
      type: data
      query: |
        fetch events
        | filter event.provider == "METRIC_EVENTS"
            or event.provider == "KUBERNETES_ANOMALY_DETECTION"
        | makeTimeseries count = count(), interval: 30m, by: {event.type}
      visualization: lineChart
      visualizationSettings:
        autoSelectVisualization: false
        chartSettings:
          legend:
            position: bottom
            showLegend: true
      davis:
        enabled: false
        davisVisualization:
          isAvailable: true

    "19":
      title: ""
      type: markdown
      content: "### ♻️ Recurring Problem Detection — Automation Masking Root Causes?"

    "20":
      title: "Problems Recurring by Name — Potential Unresolved Root Causes"
      type: data
      query: |
        fetch dt.davis.problems
        | filter not(dt.davis.is_duplicate)
        | summarize occurrences = count(),
            active_now = countIf(event.status == "ACTIVE"),
            first_seen = min(event.start),
            last_seen = max(event.start),
            by: {event.name}
        | filter occurrences > 1
        | sort occurrences desc
        | limit 20
      visualization: table
      visualizationSettings:
        autoSelectVisualization: false
        table:
          linewrapEnabled: true
      davis:
        enabled: false
        davisVisualization:
          isAvailable: true

    "21":
      title: "Problem Resolution Rate Over Time"
      type: data
      query: |
        fetch dt.davis.problems
        | filter not(dt.davis.is_duplicate)
        | makeTimeseries active = countIf(event.status == "ACTIVE"),
            resolved = countIf(event.status == "CLOSED"),
            interval: 30m
      visualization: areaChart
      visualizationSettings:
        autoSelectVisualization: false
        chartSettings:
          legend:
            position: bottom
            showLegend: true
          stacked: false
      davis:
        enabled: false
        davisVisualization:
          isAvailable: true

    "22":
      title: ""
      type: markdown
      content: "### 🚀 CI/CD & Deployment Context"

    "23":
      title: "CI/CD Events — GitHub & Azure DevOps"
      type: data
      query: |
        fetch events
        | filter event.provider == "github.com" or event.provider == "azure.devops"
        | summarize deployments = count(), by: {event.provider, event.type}
        | sort deployments desc
        | limit 15
      visualization: table
      visualizationSettings:
        autoSelectVisualization: false
        table:
          linewrapEnabled: false
      davis:
        enabled: false
        davisVisualization:
          isAvailable: true

    "24":
      title: "Slowdown & Performance Degradation Problems"
      type: data
      query: |
        fetch dt.davis.problems
        | filter not(dt.davis.is_duplicate) and event.category == "SLOWDOWN"
        | fields display_id, event.name, event.status, event.start,
            root_cause_entity_name,
            affected_count = arraySize(smartscape.affected_entity.ids)
        | sort event.start desc
        | limit 15
      visualization: table
      visualizationSettings:
        autoSelectVisualization: false
        table:
          linewrapEnabled: false
      davis:
        enabled: false
        davisVisualization:
          isAvailable: true
