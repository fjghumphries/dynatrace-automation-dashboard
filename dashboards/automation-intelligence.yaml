  tiles:

    # ════════════════════════════════════════════════════════════
    # MAIN HEADER
    # ════════════════════════════════════════════════════════════
    "1":
      title: ""
      type: markdown
      content: |
        ## 🤖 Automation Intelligence Center
        Visualize the full lifecycle of problems and their automated responses — from detection through remediation. Use this dashboard to understand **where automation is working**, where it is **masking unresolved root causes**, and which issues are **cycling indefinitely** without a permanent fix.

        > **Key questions to answer:** Are problems being auto-resolved or just temporarily suppressed? Which issues keep recurring? Is automation coverage growing fast enough to match the problem rate?

    # ════════════════════════════════════════════════════════════
    # KPI ROW 1 — PROBLEM HEALTH
    # ════════════════════════════════════════════════════════════
    "2":
      title: "Active Problems"
      type: data
      query: |
        fetch dt.davis.problems
        | filter not(dt.davis.is_duplicate) and event.status == "ACTIVE"
        | summarize active_problems = count()
      visualization: singleValue
      visualizationSettings:
        autoSelectVisualization: false
        singleValue:
          showLabel: true
          label: "Active Problems"
          recordField: active_problems
      coloring:
        colorRules:
          - { colorMode: custom-color, comparator: ">", customColor: { Default: "#2f6862" }, field: active_problems, value: -1 }
          - { colorMode: custom-color, comparator: ">", customColor: { Default: "#eea53c" }, field: active_problems, value: 10 }
          - { colorMode: custom-color, comparator: ">", customColor: { Default: "#c62239" }, field: active_problems, value: 20 }
      davis: { enabled: false, davisVisualization: { isAvailable: true } }

    "3":
      title: "Availability Issues"
      type: data
      query: |
        fetch dt.davis.problems
        | filter not(dt.davis.is_duplicate) and event.status == "ACTIVE"
          and event.category == "AVAILABILITY"
        | summarize count = count()
      visualization: singleValue
      visualizationSettings:
        autoSelectVisualization: false
        singleValue:
          showLabel: true
          label: "Availability"
          recordField: count
      coloring:
        colorRules:
          - { colorMode: custom-color, comparator: ">", customColor: { Default: "#2f6862" }, field: count, value: -1 }
          - { colorMode: custom-color, comparator: ">", customColor: { Default: "#eea53c" }, field: count, value: 2 }
          - { colorMode: custom-color, comparator: ">", customColor: { Default: "#c62239" }, field: count, value: 5 }
      davis: { enabled: false, davisVisualization: { isAvailable: true } }

    "4":
      title: "Error Rate Problems"
      type: data
      query: |
        fetch dt.davis.problems
        | filter not(dt.davis.is_duplicate) and event.status == "ACTIVE"
          and event.category == "ERROR"
        | summarize count = count()
      visualization: singleValue
      visualizationSettings:
        autoSelectVisualization: false
        singleValue:
          showLabel: true
          label: "Errors"
          recordField: count
      coloring:
        colorRules:
          - { colorMode: custom-color, comparator: ">", customColor: { Default: "#2f6862" }, field: count, value: -1 }
          - { colorMode: custom-color, comparator: ">", customColor: { Default: "#eea53c" }, field: count, value: 2 }
          - { colorMode: custom-color, comparator: ">", customColor: { Default: "#c62239" }, field: count, value: 5 }
      davis: { enabled: false, davisVisualization: { isAvailable: true } }

    "5":
      title: "Resource Contention"
      type: data
      query: |
        fetch dt.davis.problems
        | filter not(dt.davis.is_duplicate) and event.status == "ACTIVE"
          and event.category == "RESOURCE_CONTENTION"
        | summarize count = count()
      visualization: singleValue
      visualizationSettings:
        autoSelectVisualization: false
        singleValue:
          showLabel: true
          label: "Resource"
          recordField: count
      coloring:
        colorRules:
          - { colorMode: custom-color, comparator: ">", customColor: { Default: "#2f6862" }, field: count, value: -1 }
          - { colorMode: custom-color, comparator: ">", customColor: { Default: "#eea53c" }, field: count, value: 2 }
          - { colorMode: custom-color, comparator: ">", customColor: { Default: "#c62239" }, field: count, value: 5 }
      davis: { enabled: false, davisVisualization: { isAvailable: true } }

    "6":
      title: "Resolved (Closed)"
      type: data
      query: |
        fetch dt.davis.problems
        | filter not(dt.davis.is_duplicate) and event.status == "CLOSED"
        | summarize resolved = count()
      visualization: singleValue
      visualizationSettings:
        autoSelectVisualization: false
        singleValue:
          showLabel: true
          label: "Resolved"
          recordField: resolved
      coloring:
        colorRules:
          - { colorMode: custom-color, comparator: ">", customColor: { Default: "#2f6862" }, field: resolved, value: -1 }
      davis: { enabled: false, davisVisualization: { isAvailable: true } }

    # ════════════════════════════════════════════════════════════
    # KPI ROW 2 — AUTOMATION HEALTH
    # ════════════════════════════════════════════════════════════
    "25":
      title: "% Auto-Resolved (< 15 min)"
      type: data
      query: |
        fetch dt.davis.problems
        | filter not(dt.davis.is_duplicate) and event.status == "CLOSED"
          and isNotNull(resolved_problem_duration)
        | fieldsAdd duration_min = resolved_problem_duration / 1min
        | summarize total_closed = count(), fast_resolved = countIf(duration_min < 15)
        | fieldsAdd pct_auto_resolved = fast_resolved * 100 / total_closed
      visualization: singleValue
      visualizationSettings:
        autoSelectVisualization: false
        singleValue:
          showLabel: true
          label: "% Auto-Resolved"
          recordField: pct_auto_resolved
      coloring:
        colorRules:
          - { colorMode: custom-color, comparator: ">", customColor: { Default: "#c62239" }, field: pct_auto_resolved, value: -1 }
          - { colorMode: custom-color, comparator: ">", customColor: { Default: "#eea53c" }, field: pct_auto_resolved, value: 40 }
          - { colorMode: custom-color, comparator: ">", customColor: { Default: "#2f6862" }, field: pct_auto_resolved, value: 70 }
      davis: { enabled: false, davisVisualization: { isAvailable: true } }

    "26":
      title: "Automation Pass Rate %"
      type: data
      query: |
        fetch bizevents
        | filter event.provider == "workflows"
          and event.type == "demoability.test.problem-pattern"
        | summarize total = count(), pass = countIf(pattern.status == "pass")
        | fieldsAdd pct_pass = pass * 100 / total
      visualization: singleValue
      visualizationSettings:
        autoSelectVisualization: false
        singleValue:
          showLabel: true
          label: "Pattern Pass Rate"
          recordField: pct_pass
      coloring:
        colorRules:
          - { colorMode: custom-color, comparator: ">", customColor: { Default: "#c62239" }, field: pct_pass, value: -1 }
          - { colorMode: custom-color, comparator: ">", customColor: { Default: "#eea53c" }, field: pct_pass, value: 60 }
          - { colorMode: custom-color, comparator: ">", customColor: { Default: "#2f6862" }, field: pct_pass, value: 80 }
      davis: { enabled: false, davisVisualization: { isAvailable: true } }

    "27":
      title: "Workflow Executions"
      type: data
      query: |
        fetch bizevents
        | filter event.provider == "workflows"
        | summarize executions = count()
      visualization: singleValue
      visualizationSettings:
        autoSelectVisualization: false
        singleValue:
          showLabel: true
          label: "Executions"
          recordField: executions
      coloring:
        colorRules:
          - { colorMode: custom-color, comparator: ">", customColor: { Default: "#2f6862" }, field: executions, value: -1 }
      davis: { enabled: false, davisVisualization: { isAvailable: true } }

    "28":
      title: "Frequent / Recurring Issues"
      type: data
      query: |
        fetch dt.davis.problems
        | filter not(dt.davis.is_duplicate) and event.status == "ACTIVE"
          and dt.davis.is_frequent_event == true
        | summarize frequent_count = count()
      visualization: singleValue
      visualizationSettings:
        autoSelectVisualization: false
        singleValue:
          showLabel: true
          label: "Frequent Issues"
          recordField: frequent_count
      coloring:
        colorRules:
          - { colorMode: custom-color, comparator: ">", customColor: { Default: "#2f6862" }, field: frequent_count, value: -1 }
          - { colorMode: custom-color, comparator: ">", customColor: { Default: "#eea53c" }, field: frequent_count, value: 0 }
          - { colorMode: custom-color, comparator: ">", customColor: { Default: "#c62239" }, field: frequent_count, value: 5 }
      davis: { enabled: false, davisVisualization: { isAvailable: true } }

    # ════════════════════════════════════════════════════════════
    # SECTION: PROBLEM LANDSCAPE
    # ════════════════════════════════════════════════════════════
    "7":
      title: ""
      type: markdown
      content: |
        ### 🌐 Problem Landscape
        The current distribution and trend of all detected problems. **A growing active count with flat automation executions signals a coverage gap** — new problem types are appearing that no workflow is configured to handle. Spikes in AVAILABILITY are highest priority as they indicate user-facing outages.

    "8":
      title: "Active Problems by Category"
      type: data
      query: |
        fetch dt.davis.problems
        | filter not(dt.davis.is_duplicate) and event.status == "ACTIVE"
        | summarize count(), by: {event.category}
        | sort `count()` desc
      visualization: pieChart
      visualizationSettings:
        autoSelectVisualization: false
      davis: { enabled: false, davisVisualization: { isAvailable: true } }

    "9":
      title: "Problem Activity Over Time — Active vs Closed by Category"
      type: data
      query: |
        fetch dt.davis.problems
        | filter not(dt.davis.is_duplicate)
        | makeTimeseries
            active = countIf(event.status == "ACTIVE"),
            closed = countIf(event.status == "CLOSED"),
            interval: 30m,
            by: {event.category}
      visualization: areaChart
      visualizationSettings:
        autoSelectVisualization: false
        chartSettings:
          legend:
            position: bottom
            showLegend: true
          stacked: false
      davis: { enabled: false, davisVisualization: { isAvailable: true } }

    # ════════════════════════════════════════════════════════════
    # SECTION: PROBLEM DETAILS & ENTITY IMPACT
    # ════════════════════════════════════════════════════════════
    "10":
      title: ""
      type: markdown
      content: |
        ### 📋 Problem Details & Entity Impact
        Individual problem records with root cause attribution and blast radius. **High `affected_count` values signal cascading failures** — a single root cause spreading across services or nodes. Empty `root_cause_entity_name` means Davis has not yet pinpointed the origin, making targeted automation harder to configure.

    "11":
      title: "Recent Problems — Status, Root Cause & Blast Radius"
      type: data
      query: |
        fetch dt.davis.problems
        | filter not(dt.davis.is_duplicate)
        | fields display_id, event.name, event.category, event.status,
            event.start, root_cause_entity_name,
            affected_count = arraySize(smartscape.affected_entity.ids)
        | sort event.start desc
        | limit 25
      visualization: table
      visualizationSettings:
        autoSelectVisualization: false
        table:
          linewrapEnabled: true
      davis: { enabled: false, davisVisualization: { isAvailable: true } }

    "12":
      title: "Active Problems by Affected Entity Type"
      type: data
      query: |
        fetch dt.davis.problems
        | filter not(dt.davis.is_duplicate) and event.status == "ACTIVE"
        | filter isNotNull(smartscape.affected_entity.types)
        | fieldsAdd entity_type = arrayToString(smartscape.affected_entity.types,
            delimiter: ",")
        | summarize total = count(),
            avg_blast_radius = avg(arraySize(smartscape.affected_entity.ids)),
            by: {entity_type}
        | sort total desc
        | limit 10
      visualization: table
      visualizationSettings:
        autoSelectVisualization: false
        table:
          linewrapEnabled: false
      davis: { enabled: false, davisVisualization: { isAvailable: true } }

    # ════════════════════════════════════════════════════════════
    # SECTION: ROOT CAUSE INTELLIGENCE
    # ════════════════════════════════════════════════════════════
    "13":
      title: ""
      type: markdown
      content: |
        ### 🔬 Root Cause Intelligence
        **The critical automation quality signal.** Root causes with `active_now > 0` and `total_problems > 1` are the highest-risk entries: automation is repeatedly closing the symptom without fixing the underlying issue — accumulating operational debt with every auto-close cycle. MTTR by category reveals which problem types are hardest to resolve and where automation investment has the highest ROI.

    "14":
      title: "Known Root Causes — Recurrence & Active Status"
      type: data
      query: |
        fetch dt.davis.problems
        | filter not(dt.davis.is_duplicate)
        | filter isNotNull(root_cause_entity_name)
        | summarize total_problems = count(),
            active_now = countIf(event.status == "ACTIVE"),
            last_seen = max(event.start),
            by: {root_cause_entity_name}
        | sort total_problems desc
        | limit 15
      visualization: table
      visualizationSettings:
        autoSelectVisualization: false
        table:
          linewrapEnabled: false
      davis: { enabled: false, davisVisualization: { isAvailable: true } }

    "15":
      title: "Avg Time to Resolve by Category (minutes)"
      type: data
      query: |
        fetch dt.davis.problems
        | filter not(dt.davis.is_duplicate) and isNotNull(resolved_problem_duration)
        | fieldsAdd duration_min = resolved_problem_duration / 1min
        | summarize
            avg_mttr = avg(duration_min),
            p95_mttr = percentile(duration_min, 95),
            problem_count = count(),
            by: {event.category}
        | sort avg_mttr desc
      visualization: table
      visualizationSettings:
        autoSelectVisualization: false
        table:
          linewrapEnabled: false
      davis: { enabled: false, davisVisualization: { isAvailable: true } }

    # ════════════════════════════════════════════════════════════
    # SECTION: AUTOMATION & WORKFLOW ACTIVITY
    # ════════════════════════════════════════════════════════════
    "16":
      title: ""
      type: markdown
      content: |
        ### 🤖 Automation & Workflow Activity
        Volume and frequency of automated responses to anomaly signals. **Workflow execution spikes should correlate with anomaly volume spikes** — a flat automation line during a problem surge means workflows are not triggering, likely due to misconfigured alert rules or missing trigger conditions. The pattern execution table shows which use cases are actively being automated.

    "17":
      title: "Workflow Executions — Pass / Fail by Type"
      type: data
      query: |
        fetch bizevents
        | filter event.provider == "workflows"
        | summarize executions = count(),
            passed = countIf(test.result == "pass"),
            failed = countIf(test.result == "fail"),
            by: {event.type}
        | sort executions desc
      visualization: table
      visualizationSettings:
        autoSelectVisualization: false
        table:
          linewrapEnabled: false
      davis: { enabled: false, davisVisualization: { isAvailable: true } }

    "18":
      title: "Anomaly Signal Volume Over Time — Kubernetes & Metric Events"
      type: data
      query: |
        fetch events
        | filter event.provider == "METRIC_EVENTS"
            or event.provider == "KUBERNETES_ANOMALY_DETECTION"
        | makeTimeseries count = count(), interval: 30m, by: {event.type}
      visualization: lineChart
      visualizationSettings:
        autoSelectVisualization: false
        chartSettings:
          legend:
            position: bottom
            showLegend: true
      davis: { enabled: false, davisVisualization: { isAvailable: true } }

    # ════════════════════════════════════════════════════════════
    # SECTION: AUTOMATION EFFECTIVENESS
    # ════════════════════════════════════════════════════════════
    "29":
      title: ""
      type: markdown
      content: |
        ### 📊 Automation Effectiveness
        Quantifies how well the automation is performing end-to-end. **% Auto-Resolved** (problems closed in under 15 minutes) is a proxy for automated remediation — human-driven resolution rarely completes that quickly. **Pattern rows with a null `problem.display.id`** mean the automation check ran but found no matching active problem, which is the ideal healthy state. Fail rows with a non-null problem ID indicate a remediation attempt that did not succeed.

    "30":
      title: "Automation Patterns — Execution Log (Problem × Pattern × Outcome)"
      type: data
      query: |
        fetch bizevents
        | filter event.provider == "workflows"
          and event.type == "demoability.test.problem-pattern"
        | fields timestamp, pattern.name, pattern.application,
            pattern.status, problem.display.id
        | sort timestamp desc
        | limit 25
      visualization: table
      visualizationSettings:
        autoSelectVisualization: false
        table:
          linewrapEnabled: false
      davis: { enabled: false, davisVisualization: { isAvailable: true } }

    "31":
      title: "Resolution Time Distribution by Category"
      type: data
      query: |
        fetch dt.davis.problems
        | filter not(dt.davis.is_duplicate) and event.status == "CLOSED"
          and isNotNull(resolved_problem_duration)
        | fieldsAdd duration_min = resolved_problem_duration / 1min
        | fieldsAdd duration_bucket = if(duration_min < 5,
            then: "⚡ < 5 min",
            else: if(duration_min < 15,
              then: "🟢 5–15 min",
              else: if(duration_min < 60,
                then: "🟡 15–60 min",
                else: "🔴 > 60 min")))
        | summarize count = count(), by: {event.category, duration_bucket}
        | sort event.category asc
      visualization: table
      visualizationSettings:
        autoSelectVisualization: false
        table:
          linewrapEnabled: false
      davis: { enabled: false, davisVisualization: { isAvailable: true } }

    # ════════════════════════════════════════════════════════════
    # SECTION: RECURRING PROBLEM DETECTION
    # ════════════════════════════════════════════════════════════
    "19":
      title: ""
      type: markdown
      content: |
        ### ♻️ Recurring Problem Detection — The Automation Debt Meter
        Each row here represents a problem that has been detected — and presumably resolved — more than once. **High `occurrences` with `active_now > 0` is the highest-priority signal**: automation is cycling on this issue right now. The key question is whether automation is buying time while a fix is developed, or has silently become a permanent workaround that masks a systemic failure nobody is fixing.

    "20":
      title: "Problems Recurring by Name — Potential Unresolved Root Causes"
      type: data
      query: |
        fetch dt.davis.problems
        | filter not(dt.davis.is_duplicate)
        | summarize occurrences = count(),
            active_now = countIf(event.status == "ACTIVE"),
            first_seen = min(event.start),
            last_seen = max(event.start),
            by: {event.name}
        | filter occurrences > 1
        | sort occurrences desc
        | limit 20
      visualization: table
      visualizationSettings:
        autoSelectVisualization: false
        table:
          linewrapEnabled: true
      davis: { enabled: false, davisVisualization: { isAvailable: true } }

    "21":
      title: "Problem Resolution Rate Over Time"
      type: data
      query: |
        fetch dt.davis.problems
        | filter not(dt.davis.is_duplicate)
        | makeTimeseries
            active = countIf(event.status == "ACTIVE"),
            resolved = countIf(event.status == "CLOSED"),
            interval: 30m
      visualization: areaChart
      visualizationSettings:
        autoSelectVisualization: false
        chartSettings:
          legend:
            position: bottom
            showLegend: true
          stacked: false
      davis: { enabled: false, davisVisualization: { isAvailable: true } }

    # ════════════════════════════════════════════════════════════
    # SECTION: CI/CD & DEPLOYMENT CONTEXT
    # ════════════════════════════════════════════════════════════
    "22":
      title: ""
      type: markdown
      content: |
        ### 🚀 CI/CD & Deployment Context
        Correlation between deployment events and problem spikes. **Problems appearing within 30–60 minutes of a deployment are prime regression candidates** — check whether automation has rollback or canary-abort workflows configured for those services. The slowdown table is especially valuable here: degraded response times post-deploy often indicate resource leaks or unoptimized queries introduced in the change.

    "23":
      title: "CI/CD Events — GitHub & Azure DevOps"
      type: data
      query: |
        fetch events
        | filter event.provider == "github.com" or event.provider == "azure.devops"
        | summarize deployments = count(), by: {event.provider, event.type}
        | sort deployments desc
        | limit 15
      visualization: table
      visualizationSettings:
        autoSelectVisualization: false
        table:
          linewrapEnabled: false
      davis: { enabled: false, davisVisualization: { isAvailable: true } }

    "24":
      title: "Slowdown & Performance Degradation Problems"
      type: data
      query: |
        fetch dt.davis.problems
        | filter not(dt.davis.is_duplicate) and event.category == "SLOWDOWN"
        | fields display_id, event.name, event.status, event.start,
            root_cause_entity_name,
            affected_count = arraySize(smartscape.affected_entity.ids)
        | sort event.start desc
        | limit 15
      visualization: table
      visualizationSettings:
        autoSelectVisualization: false
        table:
          linewrapEnabled: false
      davis: { enabled: false, davisVisualization: { isAvailable: true } }
