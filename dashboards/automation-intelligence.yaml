name: "Automation Intelligence Center"
type: dashboard
id: b4d9c685-2a32-4f58-bc9a-9074fde437a8
content:
  annotations: []
  importedWithCode: false
  variables:
    - version: 2
      key: WorkflowTitle
      type: query
      visible: true
      editable: true
      multiple: true
      defaultValue: "*"
      input: |
        fetch dt.system.events
        | filter event.kind == "WORKFLOW_EVENT" and event.type == "WORKFLOW_EXECUTION"
        | filter dt.automation_engine.workflow_execution.trigger.type == "Event"
        | filter dt.automation_engine.state.is_final == true
        | summarize count(), by: {dt.automation_engine.workflow.title}
        | fields dt.automation_engine.workflow.title
        | sort dt.automation_engine.workflow.title asc
  settings:
    defaultTimeframe:
      enabled: true
      value:
        from: now()-24h
        to: now()
  layouts:
    # ── Header ────────────────────────────────────────────────
    "1":  { x: 0,  "y": 0,  w: 24, h: 3 }
    # ── KPI Row ───────────────────────────────────────────────
    "2":  { x: 0,  "y": 3,  w: 6,  h: 3 }
    "3":  { x: 6,  "y": 3,  w: 6,  h: 3 }
    "4":  { x: 12, "y": 3,  w: 6,  h: 3 }
    "5":  { x: 18, "y": 3,  w: 6,  h: 3 }
    # ── Section: Entity Automation Loops ──────────────────────
    "6":  { x: 0,  "y": 6,  w: 24, h: 2 }
    "7":  { x: 0,  "y": 8,  w: 12, h: 8 }
    "8":  { x: 12, "y": 8,  w: 12, h: 8 }
    # ── Section: Workflow Activity ─────────────────────────────
    "9":  { x: 0,  "y": 16, w: 24, h: 2 }
    "10": { x: 0,  "y": 18, w: 10, h: 7 }
    "11": { x: 10, "y": 18, w: 14, h: 7 }
    # ── Section: ServiceNow Integration ───────────────────────
    "12": { x: 0,  "y": 25, w: 24, h: 2 }
    "13": { x: 0,  "y": 27, w: 14, h: 8 }
    "14": { x: 14, "y": 27, w: 10, h: 8 }

  tiles:

    # ════════════════════════════════════════════════════════════
    # HEADER
    # ════════════════════════════════════════════════════════════
    "1":
      title: ""
      type: markdown
      content: |
        ## 🤖 Automation Intelligence Center
        Every tile here starts from **workflow executions triggered by Davis problems** — sourced directly from the Automation Engine via `dt.system.events`. Problems that never triggered a workflow are excluded entirely.

        > **What to look for:** Entities with high trigger counts and `active_now > 0` are your automation debt — the remediation fired but the root cause persists. The same entity triggering the same workflow repeatedly is the clearest signal that the fix is superficial.

    # ════════════════════════════════════════════════════════════
    # KPI ROW
    # ════════════════════════════════════════════════════════════
    "2":
      title: "Problem-Triggered Executions"
      type: data
      query: |
        fetch dt.system.events
        | filter event.kind == "WORKFLOW_EVENT" and event.type == "WORKFLOW_EXECUTION"
        | filter dt.automation_engine.workflow_execution.trigger.type == "Event"
        | filter dt.automation_engine.state.is_final == true
        | filter isNotNull(dt.automation_engine.workflow_execution.trigger.event.id)
        | filter in(dt.automation_engine.workflow.title, array($WorkflowTitle))
        | fields trigger_event_id = dt.automation_engine.workflow_execution.trigger.event.id
        | lookup [
            fetch events
            | filter event.kind == "DAVIS_PROBLEM"
            | fields event.id
          ],
          sourceField: trigger_event_id,
          lookupField: event.id
        | filter isNotNull(lookup.event.id)
        | summarize total_triggers = count()
      visualization: singleValue
      visualizationSettings:
        autoSelectVisualization: false
        singleValue:
          showLabel: true
          label: "Workflow Triggers"
          recordField: total_triggers
      coloring:
        colorRules:
          - { colorMode: custom-color, comparator: ">", customColor: { Default: "#2f6862" }, field: total_triggers, value: -1 }
      davis: { enabled: false, davisVisualization: { isAvailable: true } }

    "3":
      title: "Execution Success Rate %"
      type: data
      query: |
        fetch dt.system.events
        | filter event.kind == "WORKFLOW_EVENT" and event.type == "WORKFLOW_EXECUTION"
        | filter dt.automation_engine.workflow_execution.trigger.type == "Event"
        | filter dt.automation_engine.state.is_final == true
        | filter isNotNull(dt.automation_engine.workflow_execution.trigger.event.id)
        | filter in(dt.automation_engine.workflow.title, array($WorkflowTitle))
        | fields
            state = dt.automation_engine.state,
            trigger_event_id = dt.automation_engine.workflow_execution.trigger.event.id
        | lookup [
            fetch events
            | filter event.kind == "DAVIS_PROBLEM"
            | fields event.id
          ],
          sourceField: trigger_event_id,
          lookupField: event.id
        | filter isNotNull(lookup.event.id)
        | summarize total = count(), success = countIf(state == "SUCCESS")
        | fieldsAdd pct_success = success * 100 / total
      visualization: singleValue
      visualizationSettings:
        autoSelectVisualization: false
        singleValue:
          showLabel: true
          label: "Success Rate"
          recordField: pct_success
      coloring:
        colorRules:
          - { colorMode: custom-color, comparator: ">", customColor: { Default: "#c62239" }, field: pct_success, value: -1 }
          - { colorMode: custom-color, comparator: ">", customColor: { Default: "#eea53c" }, field: pct_success, value: 60 }
          - { colorMode: custom-color, comparator: ">", customColor: { Default: "#2f6862" }, field: pct_success, value: 80 }
      davis: { enabled: false, davisVisualization: { isAvailable: true } }

    "4":
      title: "Entities with Open Problems Post-Automation"
      type: data
      query: |
        fetch dt.system.events
        | filter event.kind == "WORKFLOW_EVENT" and event.type == "WORKFLOW_EXECUTION"
        | filter dt.automation_engine.workflow_execution.trigger.type == "Event"
        | filter dt.automation_engine.state.is_final == true
        | filter isNotNull(dt.automation_engine.workflow_execution.trigger.event.id)
        | filter in(dt.automation_engine.workflow.title, array($WorkflowTitle))
        | fields trigger_event_id = dt.automation_engine.workflow_execution.trigger.event.id
        | lookup [
            fetch events
            | filter event.kind == "DAVIS_PROBLEM"
            | fields event.id, event.status, affected_entity_names
          ],
          sourceField: trigger_event_id,
          lookupField: event.id
        | filter isNotNull(lookup.event.id) and lookup.event.status == "ACTIVE"
        | expand entity = lookup.affected_entity_names
        | summarize still_open = countDistinct(entity)
      visualization: singleValue
      visualizationSettings:
        autoSelectVisualization: false
        singleValue:
          showLabel: true
          label: "Still Active"
          recordField: still_open
      coloring:
        colorRules:
          - { colorMode: custom-color, comparator: ">", customColor: { Default: "#2f6862" }, field: still_open, value: -1 }
          - { colorMode: custom-color, comparator: ">", customColor: { Default: "#eea53c" }, field: still_open, value: 5 }
          - { colorMode: custom-color, comparator: ">", customColor: { Default: "#c62239" }, field: still_open, value: 15 }
      davis: { enabled: false, davisVisualization: { isAvailable: true } }

    "5":
      title: "Failed Workflow Executions"
      type: data
      query: |
        fetch dt.system.events
        | filter event.kind == "WORKFLOW_EVENT" and event.type == "WORKFLOW_EXECUTION"
        | filter dt.automation_engine.workflow_execution.trigger.type == "Event"
        | filter dt.automation_engine.state.is_final == true
        | filter dt.automation_engine.state == "ERROR"
        | filter isNotNull(dt.automation_engine.workflow_execution.trigger.event.id)
        | filter in(dt.automation_engine.workflow.title, array($WorkflowTitle))
        | fields trigger_event_id = dt.automation_engine.workflow_execution.trigger.event.id
        | lookup [
            fetch events
            | filter event.kind == "DAVIS_PROBLEM"
            | fields event.id
          ],
          sourceField: trigger_event_id,
          lookupField: event.id
        | filter isNotNull(lookup.event.id)
        | summarize failed_executions = count()
      visualization: singleValue
      visualizationSettings:
        autoSelectVisualization: false
        singleValue:
          showLabel: true
          label: "Failed Executions"
          recordField: failed_executions
      coloring:
        colorRules:
          - { colorMode: custom-color, comparator: ">", customColor: { Default: "#2f6862" }, field: failed_executions, value: -1 }
          - { colorMode: custom-color, comparator: ">", customColor: { Default: "#eea53c" }, field: failed_executions, value: 3 }
          - { colorMode: custom-color, comparator: ">", customColor: { Default: "#c62239" }, field: failed_executions, value: 10 }
      davis: { enabled: false, davisVisualization: { isAvailable: true } }

    # ════════════════════════════════════════════════════════════
    # SECTION: ENTITY AUTOMATION LOOPS
    # ════════════════════════════════════════════════════════════
    "6":
      title: ""
      type: markdown
      content: |
        ### ♻️ Entity Automation Loops
        Entities ranked by how many times they have triggered a workflow. **`active_now > 0` while `workflow_triggers > 1`** means a workflow is firing repeatedly without closing the problem — the clearest sign of a superficial fix. The right tile narrows to entity × workflow pairs that repeat, pinpointing exactly which automation is cycling on the same issue.

    "7":
      title: "Entities by Workflow Trigger Frequency"
      type: data
      query: |
        fetch dt.system.events
        | filter event.kind == "WORKFLOW_EVENT" and event.type == "WORKFLOW_EXECUTION"
        | filter dt.automation_engine.workflow_execution.trigger.type == "Event"
        | filter dt.automation_engine.state.is_final == true
        | filter isNotNull(dt.automation_engine.workflow_execution.trigger.event.id)
        | filter in(dt.automation_engine.workflow.title, array($WorkflowTitle))
        | fields
            workflow_title = dt.automation_engine.workflow.title,
            state = dt.automation_engine.state,
            trigger_event_id = dt.automation_engine.workflow_execution.trigger.event.id
        | lookup [
            fetch events
            | filter event.kind == "DAVIS_PROBLEM"
            | fields event.id, event.category, event.status, affected_entity_names
          ],
          sourceField: trigger_event_id,
          lookupField: event.id
        | filter isNotNull(lookup.event.id)
        | expand entity = lookup.affected_entity_names
        | summarize
            workflow_triggers = count(),
            active_now = countIf(lookup.event.status == "ACTIVE"),
            unique_workflows = countDistinct(workflow_title),
            problem_categories = arrayToString(collectDistinct(lookup.event.category), delimiter: ", "),
            by: {entity}
        | sort workflow_triggers desc
        | limit 20
      visualization: table
      visualizationSettings:
        autoSelectVisualization: false
        table:
          linewrapEnabled: false
      davis: { enabled: false, davisVisualization: { isAvailable: true } }

    "8":
      title: "Superficial Remediation Detector — Same Entity × Same Workflow Repeated"
      type: data
      query: |
        fetch dt.system.events
        | filter event.kind == "WORKFLOW_EVENT" and event.type == "WORKFLOW_EXECUTION"
        | filter dt.automation_engine.workflow_execution.trigger.type == "Event"
        | filter dt.automation_engine.state.is_final == true
        | filter isNotNull(dt.automation_engine.workflow_execution.trigger.event.id)
        | filter in(dt.automation_engine.workflow.title, array($WorkflowTitle))
        | fields
            workflow_title = dt.automation_engine.workflow.title,
            trigger_event_id = dt.automation_engine.workflow_execution.trigger.event.id
        | lookup [
            fetch events
            | filter event.kind == "DAVIS_PROBLEM"
            | fields event.id, event.category, event.status, affected_entity_names
          ],
          sourceField: trigger_event_id,
          lookupField: event.id
        | filter isNotNull(lookup.event.id)
        | expand entity = lookup.affected_entity_names
        | summarize
            times_triggered = count(),
            still_active = countIf(lookup.event.status == "ACTIVE"),
            problem_category = takeAny(lookup.event.category),
            by: {entity, workflow_title}
        | filter times_triggered > 1
        | sort times_triggered desc
        | limit 20
      visualization: table
      visualizationSettings:
        autoSelectVisualization: false
        table:
          linewrapEnabled: false
      davis: { enabled: false, davisVisualization: { isAvailable: true } }

    # ════════════════════════════════════════════════════════════
    # SECTION: WORKFLOW ACTIVITY
    # ════════════════════════════════════════════════════════════
    "9":
      title: ""
      type: markdown
      content: |
        ### 🔧 Workflow Activity
        Health and volume of every workflow that has been triggered by a Davis problem. **High error rates on a specific workflow** mean the automation is attempting but failing — the entity is still at risk and the failure mode needs investigation. The timeline shows when automation bursts occurred and whether they correlate with known problem waves.

    "10":
      title: "Workflow Health — Success vs Error Rate"
      type: data
      query: |
        fetch dt.system.events
        | filter event.kind == "WORKFLOW_EVENT" and event.type == "WORKFLOW_EXECUTION"
        | filter dt.automation_engine.workflow_execution.trigger.type == "Event"
        | filter dt.automation_engine.state.is_final == true
        | filter isNotNull(dt.automation_engine.workflow_execution.trigger.event.id)
        | filter in(dt.automation_engine.workflow.title, array($WorkflowTitle))
        | fields
            workflow_title = dt.automation_engine.workflow.title,
            state = dt.automation_engine.state,
            trigger_event_id = dt.automation_engine.workflow_execution.trigger.event.id
        | lookup [
            fetch events
            | filter event.kind == "DAVIS_PROBLEM"
            | fields event.id
          ],
          sourceField: trigger_event_id,
          lookupField: event.id
        | filter isNotNull(lookup.event.id)
        | summarize
            total = count(),
            success = countIf(state == "SUCCESS"),
            error = countIf(state == "ERROR"),
            by: {workflow_title}
        | fieldsAdd success_rate = success * 100 / total
        | sort total desc
        | limit 20
      visualization: table
      visualizationSettings:
        autoSelectVisualization: false
        table:
          linewrapEnabled: true
      davis: { enabled: false, davisVisualization: { isAvailable: true } }

    "11":
      title: "Execution Timeline — Succeeded vs Failed"
      type: data
      query: |
        fetch dt.system.events
        | filter event.kind == "WORKFLOW_EVENT" and event.type == "WORKFLOW_EXECUTION"
        | filter dt.automation_engine.workflow_execution.trigger.type == "Event"
        | filter dt.automation_engine.state.is_final == true
        | filter isNotNull(dt.automation_engine.workflow_execution.trigger.event.id)
        | filter in(dt.automation_engine.workflow.title, array($WorkflowTitle))
        | fields
            state = dt.automation_engine.state,
            trigger_event_id = dt.automation_engine.workflow_execution.trigger.event.id,
            timestamp
        | lookup [
            fetch events
            | filter event.kind == "DAVIS_PROBLEM"
            | fields event.id
          ],
          sourceField: trigger_event_id,
          lookupField: event.id
        | filter isNotNull(lookup.event.id)
        | makeTimeseries
            succeeded = countIf(state == "SUCCESS"),
            failed = countIf(state == "ERROR"),
            interval: 30m
      visualization: areaChart
      visualizationSettings:
        autoSelectVisualization: false
        chartSettings:
          legend:
            position: bottom
            showLegend: true
          stacked: false
      davis: { enabled: false, davisVisualization: { isAvailable: true } }

    # ════════════════════════════════════════════════════════════
    # SECTION: SERVICENOW INTEGRATION
    # ════════════════════════════════════════════════════════════
    "12":
      title: ""
      type: markdown
      content: |
        ### 🎫 ServiceNow Integration
        Workflows with "servicenow" or "snow" in their title, filtered to those triggered by Davis problems. **Entities appearing repeatedly** here are generating new tickets without the underlying issue being resolved — each recurrence means the automated remediation path has been exhausted and the problem requires human ownership in ServiceNow.

    "13":
      title: "ServiceNow Workflow Executions — Full Problem Log"
      type: data
      query: |
        fetch dt.system.events
        | filter event.kind == "WORKFLOW_EVENT" and event.type == "WORKFLOW_EXECUTION"
        | filter dt.automation_engine.workflow_execution.trigger.type == "Event"
        | filter dt.automation_engine.state.is_final == true
        | filter isNotNull(dt.automation_engine.workflow_execution.trigger.event.id)
        | filter contains(lower(dt.automation_engine.workflow.title), "servicenow")
            or contains(lower(dt.automation_engine.workflow.title), "snow")
        | fields
            workflow_title = dt.automation_engine.workflow.title,
            state = dt.automation_engine.state,
            trigger_event_id = dt.automation_engine.workflow_execution.trigger.event.id,
            timestamp
        | lookup [
            fetch events
            | filter event.kind == "DAVIS_PROBLEM"
            | fields event.id, display_id, event.name, event.category, event.status, affected_entity_names
          ],
          sourceField: trigger_event_id,
          lookupField: event.id
        | filter isNotNull(lookup.display_id)
        | fields
            timestamp,
            workflow_title,
            state,
            lookup.display_id,
            lookup.event.name,
            lookup.event.category,
            lookup.event.status,
            lookup.affected_entity_names
        | sort timestamp desc
        | limit 25
      visualization: table
      visualizationSettings:
        autoSelectVisualization: false
        table:
          linewrapEnabled: true
      davis: { enabled: false, davisVisualization: { isAvailable: true } }

    "14":
      title: "Entities Generating ServiceNow Tickets"
      type: data
      query: |
        fetch dt.system.events
        | filter event.kind == "WORKFLOW_EVENT" and event.type == "WORKFLOW_EXECUTION"
        | filter dt.automation_engine.workflow_execution.trigger.type == "Event"
        | filter dt.automation_engine.state.is_final == true
        | filter isNotNull(dt.automation_engine.workflow_execution.trigger.event.id)
        | filter contains(lower(dt.automation_engine.workflow.title), "servicenow")
            or contains(lower(dt.automation_engine.workflow.title), "snow")
        | fields
            workflow_title = dt.automation_engine.workflow.title,
            trigger_event_id = dt.automation_engine.workflow_execution.trigger.event.id
        | lookup [
            fetch events
            | filter event.kind == "DAVIS_PROBLEM"
            | fields event.id, event.status, affected_entity_names
          ],
          sourceField: trigger_event_id,
          lookupField: event.id
        | filter isNotNull(lookup.event.id)
        | expand entity = lookup.affected_entity_names
        | summarize
            ticket_triggers = count(),
            still_active = countIf(lookup.event.status == "ACTIVE"),
            workflows = arrayToString(collectDistinct(workflow_title), delimiter: ", "),
            by: {entity}
        | sort ticket_triggers desc
        | limit 15
      visualization: table
      visualizationSettings:
        autoSelectVisualization: false
        table:
          linewrapEnabled: false
      davis: { enabled: false, davisVisualization: { isAvailable: true } }
